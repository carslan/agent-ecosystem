<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Ecosystem — 3D World</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }

/* HUD overlay */
.hud { position: fixed; top: 0; left: 0; right: 0; z-index: 10; pointer-events: none; }
.hud-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(10,14,23,0.85); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(79,195,247,0.2); pointer-events: auto; }
.hud-title { font-size: 16px; font-weight: 700; color: #4FC3F7; letter-spacing: 2px; text-transform: uppercase; }
.hud-stats { display: flex; gap: 16px; }
.hud-stat { font-size: 12px; color: #94a3b8; }
.hud-stat span { color: #4FC3F7; font-weight: 600; }
.hud-link { font-size: 11px; color: #4FC3F7; text-decoration: none; pointer-events: auto; padding: 4px 12px; border: 1px solid rgba(79,195,247,0.3); border-radius: 4px; }
.hud-link:hover { background: rgba(79,195,247,0.1); }

/* Event feed */
.event-feed { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; pointer-events: none; }
.event-feed-inner { max-height: 140px; overflow: hidden; padding: 8px 20px; background: linear-gradient(transparent, rgba(10,14,23,0.9)); }
.ef-row { font-size: 11px; color: #94a3b8; padding: 2px 0; opacity: 0.9; }
.ef-row .ef-type { color: #4FC3F7; font-weight: 600; margin-right: 4px; }
.ef-row .ef-emoji { margin-right: 4px; }

/* Agent tooltip */
.tooltip { position: fixed; z-index: 20; background: rgba(20,30,50,0.95); border: 1px solid rgba(79,195,247,0.3); border-radius: 6px; padding: 8px 12px; pointer-events: none; display: none; max-width: 250px; }
.tooltip .tt-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.tooltip .tt-desc { font-size: 11px; color: #94a3b8; margin-bottom: 4px; }
.tooltip .tt-stats { font-size: 11px; color: #FFB74D; }
.tooltip .tt-caps { font-size: 10px; color: #4FC3F7; margin-top: 4px; }
</style>
</head>
<body>

<div class="hud">
    <div class="hud-bar">
        <div class="hud-title">Agent Ecosystem 3D</div>
        <div class="hud-stats">
            <div class="hud-stat">Agents <span id="h-agents">0</span></div>
            <div class="hud-stat">Online <span id="h-online">0</span></div>
            <div class="hud-stat">Tasks <span id="h-tasks">0</span></div>
            <div class="hud-stat">Avg <span id="h-avg">0.0</span></div>
        </div>
        <a href="/" class="hud-link">Dashboard</a>
    </div>
</div>

<div class="event-feed">
    <div class="event-feed-inner" id="eventFeed"></div>
</div>

<div class="tooltip" id="tooltip">
    <div class="tt-name" id="ttName"></div>
    <div class="tt-desc" id="ttDesc"></div>
    <div class="tt-stats" id="ttStats"></div>
    <div class="tt-caps" id="ttCaps"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const state = {
    agents: [], tasks: [], events: [], stats: {},
    agentMap: {},       // id -> agent data
    agentMeshes: {},    // id -> { group, body, head, label, emoji }
    islandMeshes: {},   // domain -> mesh
    beams: [],          // active task beams
    floatingEmojis: [], // 3D emoji sprites
    champions: {},      // domain -> agent_id
};

// ═══════════════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050a15, 0.008);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 35, 55);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x050a15);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// CSS2D for labels
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 15;
controls.maxDistance = 120;
controls.target.set(0, 2, 0);

// Resize
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    labelRenderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════════
// LIGHTING
// ═══════════════════════════════════════════════════
const ambient = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffeedd, 0.8);
dirLight.position.set(20, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// Point lights for ambiance
const pLight1 = new THREE.PointLight(0x4FC3F7, 0.4, 80);
pLight1.position.set(-20, 15, -10);
scene.add(pLight1);

const pLight2 = new THREE.PointLight(0xBA68C8, 0.3, 80);
pLight2.position.set(20, 15, 10);
scene.add(pLight2);

// ═══════════════════════════════════════════════════
// STARFIELD
// ═══════════════════════════════════════════════════
const starGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 2000; i++) {
    starPositions.push((Math.random() - 0.5) * 400, Math.random() * 150 + 20, (Math.random() - 0.5) * 400);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.8 });
scene.add(new THREE.Points(starGeo, starMat));

// ═══════════════════════════════════════════════════
// GROUND / WATER PLANE
// ═══════════════════════════════════════════════════
const waterGeo = new THREE.PlaneGeometry(200, 200, 32, 32);
const waterMat = new THREE.MeshStandardMaterial({
    color: 0x0a2040, transparent: true, opacity: 0.7,
    metalness: 0.3, roughness: 0.6,
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -1;
water.receiveShadow = true;
scene.add(water);

// ═══════════════════════════════════════════════════
// FLOATING ISLANDS (one per domain)
// ═══════════════════════════════════════════════════
const DOMAIN_COLORS = {
    research: 0x1565C0, strategy: 0x0D47A1, engineering: 0xF57C00, devops: 0xE65100,
    data: 0x7B1FA2, finance: 0x6A1B9A, nlp: 0x00897B, content: 0x00695C,
    security: 0xC62828, compliance: 0xB71C1C, design: 0xAD1457, frontend: 0x880E4F,
    infrastructure: 0x33691E, biotech: 0x1B5E20,
};

const DOMAIN_ICONS = {
    research: '\u{1F4DA}', strategy: '\u{1F3AF}', engineering: '\u{2699}\u{FE0F}', devops: '\u{1F680}',
    data: '\u{1F4CA}', finance: '\u{1F4B0}', nlp: '\u{1F4AC}', content: '\u{270D}\u{FE0F}',
    security: '\u{1F6E1}\u{FE0F}', compliance: '\u{2696}\u{FE0F}', design: '\u{1F3A8}', frontend: '\u{1F5BC}\u{FE0F}',
    infrastructure: '\u{1F3D7}\u{FE0F}', biotech: '\u{1F9EC}',
};

function createIsland(domain, position) {
    const color = DOMAIN_COLORS[domain] || 0x444444;
    const group = new THREE.Group();
    group.position.copy(position);

    // Main platform
    const platformGeo = new THREE.CylinderGeometry(6, 7, 2, 6);
    const platformMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.2 });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.castShadow = true;
    platform.receiveShadow = true;
    group.add(platform);

    // Grass top
    const topGeo = new THREE.CylinderGeometry(6, 6, 0.3, 6);
    const topMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).lerp(new THREE.Color(0x4CAF50), 0.4), roughness: 0.8 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.y = 1.15;
    top.receiveShadow = true;
    group.add(top);

    // Hanging rocks underneath
    for (let i = 0; i < 3; i++) {
        const rockGeo = new THREE.ConeGeometry(1 + Math.random() * 1.5, 3 + Math.random() * 3, 5);
        const rockMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(color).multiplyScalar(0.5), roughness: 0.9 });
        const rock = new THREE.Mesh(rockGeo, rockMat);
        rock.position.set((Math.random() - 0.5) * 6, -2 - Math.random() * 2, (Math.random() - 0.5) * 6);
        rock.rotation.x = Math.PI;
        group.add(rock);
    }

    // Glowing beacon
    const beaconGeo = new THREE.CylinderGeometry(0.15, 0.15, 4, 8);
    const beaconMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.5 });
    const beacon = new THREE.Mesh(beaconGeo, beaconMat);
    beacon.position.y = 3.5;
    group.add(beacon);

    const orbGeo = new THREE.SphereGeometry(0.5, 12, 12);
    const orbMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: color, emissiveIntensity: 1, transparent: true, opacity: 0.8 });
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.y = 5.5;
    group.add(orb);
    group.userData.orb = orb;

    // Point light from orb
    const orbLight = new THREE.PointLight(color, 0.6, 15);
    orbLight.position.y = 5.5;
    group.add(orbLight);

    // Label
    const labelDiv = document.createElement('div');
    labelDiv.style.cssText = 'font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 8px rgba(0,0,0,0.8);pointer-events:none;';
    labelDiv.textContent = (DOMAIN_ICONS[domain] || '') + ' ' + domain;
    const label = new CSS2DObject(labelDiv);
    label.position.y = 7;
    group.add(label);

    scene.add(group);
    state.islandMeshes[domain] = group;
    return group;
}

// ═══════════════════════════════════════════════════
// AGENT 3D CHARACTER
// ═══════════════════════════════════════════════════
function createAgentMesh(agent) {
    const color = new THREE.Color(agent.color);
    const group = new THREE.Group();

    // Body (capsule-like)
    const bodyGeo = new THREE.CapsuleGeometry(0.35, 0.7, 4, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.9;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.3, 12, 12);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xF5DEB3, roughness: 0.7 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.75;
    head.castShadow = true;
    group.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
    eyeL.position.set(-0.1, 1.78, 0.25);
    group.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
    eyeR.position.set(0.1, 1.78, 0.25);
    group.add(eyeR);

    // Hair (hemisphere on top)
    const hairGeo = new THREE.SphereGeometry(0.32, 12, 6, 0, Math.PI * 2, 0, Math.PI / 2);
    const hairMat = new THREE.MeshStandardMaterial({ color, roughness: 0.6 });
    const hair = new THREE.Mesh(hairGeo, hairMat);
    hair.position.y = 1.82;
    group.add(hair);

    // Glow ring at feet
    const ringGeo = new THREE.RingGeometry(0.5, 0.7, 24);
    const ringMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.05;
    group.add(ring);

    // Name label
    const nameDiv = document.createElement('div');
    nameDiv.style.cssText = `font-size:9px;font-weight:700;color:${agent.color};background:rgba(10,14,23,0.8);padding:1px 5px;border-radius:3px;border:1px solid ${agent.color}40;pointer-events:none;white-space:nowrap;`;
    nameDiv.textContent = agent.name;
    const nameLabel = new CSS2DObject(nameDiv);
    nameLabel.position.y = 2.3;
    group.add(nameLabel);

    // Emoji holder (invisible, positioned above head)
    const emojiDiv = document.createElement('div');
    emojiDiv.style.cssText = 'font-size:24px;opacity:0;transition:opacity 0.3s;pointer-events:none;';
    const emojiLabel = new CSS2DObject(emojiDiv);
    emojiLabel.position.y = 3.0;
    group.add(emojiLabel);

    // Store references
    group.userData = { agentId: agent.id, body, head, ring, ringMat, emojiDiv, nameDiv };

    scene.add(group);
    state.agentMeshes[agent.id] = group;
    return group;
}

// ═══════════════════════════════════════════════════
// TASK BEAM (glowing arc between agents)
// ═══════════════════════════════════════════════════
function createBeam(fromId, toId, status) {
    const fromMesh = state.agentMeshes[fromId];
    const toMesh = state.agentMeshes[toId];
    if (!fromMesh || !toMesh) return null;

    const color = status === 'in_progress' ? 0xFFB74D : status === 'delivered' ? 0x81C784 : 0x4FC3F7;

    const curve = new THREE.QuadraticBezierCurve3(
        fromMesh.position.clone().add(new THREE.Vector3(0, 2, 0)),
        new THREE.Vector3(
            (fromMesh.position.x + toMesh.position.x) / 2,
            Math.max(fromMesh.position.y, toMesh.position.y) + 8,
            (fromMesh.position.z + toMesh.position.z) / 2
        ),
        toMesh.position.clone().add(new THREE.Vector3(0, 2, 0))
    );

    const points = curve.getPoints(30);
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6, linewidth: 2 });
    const line = new THREE.Line(geo, mat);
    scene.add(line);

    // Traveling particle
    const particleGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const particleMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 });
    const particle = new THREE.Mesh(particleGeo, particleMat);
    scene.add(particle);

    return { line, particle, curve, color, born: performance.now(), fromId, toId, status };
}

// ═══════════════════════════════════════════════════
// SPAWN EMOJI (3D floating above agent)
// ═══════════════════════════════════════════════════
function spawnEmoji(agentId, emoji) {
    const mesh = state.agentMeshes[agentId];
    if (!mesh) return;
    const ud = mesh.userData;
    ud.emojiDiv.textContent = emoji;
    ud.emojiDiv.style.opacity = '1';
    ud.emojiDiv.style.fontSize = '28px';
    setTimeout(() => { ud.emojiDiv.style.opacity = '0'; }, 2500);
}

// ═══════════════════════════════════════════════════
// LAYOUT — position islands in a circle
// ═══════════════════════════════════════════════════
function layoutWorld() {
    const domains = new Set();
    state.agents.forEach(a => (a.domain_tags || []).forEach(d => domains.add(d)));
    const arr = [...domains];
    const radius = 8 + arr.length * 3;

    arr.forEach((d, i) => {
        const angle = (i / arr.length) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        if (!state.islandMeshes[d]) {
            createIsland(d, new THREE.Vector3(x, 0, z));
        }
    });

    // Position agents on their domain islands
    state.agents.forEach(a => {
        if (!state.agentMeshes[a.id]) createAgentMesh(a);

        const tag = (a.domain_tags || [])[0];
        const island = state.islandMeshes[tag];
        if (island) {
            const hash = hashStr(a.id);
            const angle = (hash % 360) * Math.PI / 180;
            const r = 1.5 + (hash % 30) / 10;
            const tx = island.position.x + Math.cos(angle) * r;
            const tz = island.position.z + Math.sin(angle) * r;
            const mesh = state.agentMeshes[a.id];
            if (!mesh.userData._initialized) {
                mesh.position.set(tx, 1.3, tz);
                mesh.userData._tx = tx;
                mesh.userData._tz = tz;
                mesh.userData._initialized = true;
            } else {
                mesh.userData._tx = tx;
                mesh.userData._tz = tz;
            }
        }
    });
}

function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return Math.abs(h);
}

// ═══════════════════════════════════════════════════
// UPDATE BEAMS FROM TASKS
// ═══════════════════════════════════════════════════
function updateBeams() {
    // Remove old beams
    state.beams.forEach(b => {
        scene.remove(b.line);
        scene.remove(b.particle);
        b.line.geometry.dispose();
        b.particle.geometry.dispose();
    });
    state.beams = [];

    const activeStatuses = new Set(['accepted', 'in_progress', 'delivered']);
    state.tasks.forEach(t => {
        if (!activeStatuses.has(t.status)) return;
        if (!t.assignee_id) return;
        const beam = createBeam(t.requester_id, t.assignee_id, t.status);
        if (beam) state.beams.push(beam);
    });
}

// ═══════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════
async function fetchJSON(url) { return (await fetch(url)).json(); }

async function loadAll() {
    const [agents, tasks, stats, champs] = await Promise.all([
        fetchJSON('/api/agents'), fetchJSON('/api/tasks?limit=100'),
        fetchJSON('/api/stats'), fetchJSON('/api/champions'),
    ]);
    state.agents = agents;
    state.tasks = tasks;
    state.stats = stats;
    state.agentMap = {};
    agents.forEach(a => state.agentMap[a.id] = a);
    state.champions = {};
    champs.forEach(c => state.champions[c.domain] = c.agent_id);

    // HUD
    document.getElementById('h-agents').textContent = stats.total_agents || 0;
    document.getElementById('h-online').textContent = stats.online_agents || 0;
    document.getElementById('h-tasks').textContent = stats.total_tasks || 0;
    document.getElementById('h-avg').textContent = (stats.avg_rating || 0).toFixed(1);

    layoutWorld();
    updateBeams();

    // Update agent visuals
    agents.forEach(a => {
        const mesh = state.agentMeshes[a.id];
        if (!mesh) return;
        const ud = mesh.userData;
        // Status visual
        if (a.status === 'offline') {
            ud.ringMat.opacity = 0.05;
            ud.body.material.emissive = new THREE.Color(0x000000);
        } else if (a.status === 'busy') {
            ud.ringMat.opacity = 0.6;
            ud.body.material.emissive = new THREE.Color(a.color).multiplyScalar(0.3);
        } else {
            ud.ringMat.opacity = 0.3;
            ud.body.material.emissive = new THREE.Color(0x000000);
        }
        // Champion crown
        if (Object.values(state.champions).includes(a.id)) {
            ud.nameDiv.textContent = '\u{1F451} ' + a.name;
        }
    });
}

// ═══════════════════════════════════════════════════
// SSE
// ═══════════════════════════════════════════════════
const EMOJIS = {
    agent_registered: '\u{1F44B}', task_requested: '\u{1F4CB}', task_evaluating: '\u{1F914}',
    task_accepted: '\u{2705}', task_rejected: '\u{274C}', task_in_progress: '\u{2699}\u{FE0F}',
    task_delivered: '\u{1F4E6}', task_rated: '\u{2B50}', message_sent: '\u{1F4AC}',
    capability_learned: '\u{1F9E0}', task_cancelled: '\u{1F6AB}', subtask_created: '\u{1F4CE}',
    offer_made: '\u{1F91D}', agent_online: '\u{1F7E2}', agent_offline: '\u{26AB}',
};

let lastEventId = 0;
function connectSSE() {
    const es = new EventSource(`/api/events/stream?last_event_id=${lastEventId}`);
    const types = Object.keys(EMOJIS).concat(['agent_busy', 'agent_deregistered']);

    types.forEach(type => {
        es.addEventListener(type, (e) => {
            const data = JSON.parse(e.data);
            lastEventId = data.id;
            handleEvent(type, data);
        });
    });

    es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
}

function handleEvent(type, data) {
    const payload = data.payload || {};

    // Spawn emoji
    if (data.agent_id && EMOJIS[type]) {
        spawnEmoji(data.agent_id, EMOJIS[type]);
    }

    // Reload on state changes
    if (type.startsWith('agent_') || type === 'task_rated' || type === 'capability_learned') {
        loadAll();
    } else if (type.startsWith('task_') || type === 'offer_made') {
        fetchJSON('/api/tasks?limit=100').then(tasks => {
            state.tasks = tasks;
            updateBeams();
        });
        fetchJSON('/api/stats').then(stats => {
            state.stats = stats;
            document.getElementById('h-tasks').textContent = stats.total_tasks || 0;
            document.getElementById('h-avg').textContent = (stats.avg_rating || 0).toFixed(1);
        });
    }

    // Move agents toward each other on task accept
    if (type === 'task_accepted' && data.task_id) {
        const task = state.tasks.find(t => t.id === data.task_id);
        if (task) {
            const fromMesh = state.agentMeshes[task.requester_id];
            const toMesh = state.agentMeshes[data.agent_id];
            if (fromMesh && toMesh) {
                const midX = (fromMesh.position.x + toMesh.position.x) / 2;
                const midZ = (fromMesh.position.z + toMesh.position.z) / 2;
                fromMesh.userData._tx = midX - 1;
                fromMesh.userData._tz = midZ;
                toMesh.userData._tx = midX + 1;
                toMesh.userData._tz = midZ;
                // Return after 15s
                setTimeout(() => layoutWorld(), 15000);
            }
        }
    }

    // Event feed
    addEventToFeed(type, payload);
}

function addEventToFeed(type, payload) {
    const feed = document.getElementById('eventFeed');
    const row = document.createElement('div');
    row.className = 'ef-row';
    const emoji = EMOJIS[type] || '\u{1F4CC}';
    let text = type.replace(/_/g, ' ');
    if (payload.agent_name || payload.name) text += ' \u2014 ' + (payload.agent_name || payload.name);
    if (payload.title) text += ': ' + payload.title.slice(0, 35);
    if (payload.score) text += ' \u2B50' + payload.score;
    row.innerHTML = `<span class="ef-emoji">${emoji}</span><span class="ef-type">${type.replace(/_/g, ' ')}</span>${payload.title ? payload.title.slice(0, 40) : (payload.name || payload.agent_name || '')}`;
    feed.prepend(row);
    while (feed.children.length > 15) feed.lastChild.remove();
}

// ═══════════════════════════════════════════════════
// RAYCASTING (hover tooltip)
// ═══════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const meshes = Object.values(state.agentMeshes).map(g => g.userData.body).filter(Boolean);
    const hits = raycaster.intersectObjects(meshes);

    if (hits.length > 0) {
        const agentGroup = hits[0].object.parent;
        const agentId = agentGroup.userData.agentId;
        const agent = state.agentMap[agentId];
        if (agent) {
            document.getElementById('ttName').style.color = agent.color;
            document.getElementById('ttName').textContent = agent.name;
            document.getElementById('ttDesc').textContent = agent.description || '';
            document.getElementById('ttStats').textContent = `\u2B50 ${(agent.rating_avg||0).toFixed(1)} \u2022 ${agent.total_tasks||0} tasks \u2022 ${agent.status}`;
            document.getElementById('ttCaps').textContent = (agent.capabilities || []).join(' \u2022 ');
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 10) + 'px';
        }
    } else {
        tooltip.style.display = 'none';
    }
});

// ═══════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = performance.now();
    const dt = clock.getDelta();

    controls.update();

    // Animate water
    const wpos = water.geometry.attributes.position;
    for (let i = 0; i < wpos.count; i++) {
        const x = wpos.getX(i), z = wpos.getZ(i);
        wpos.setY(i, Math.sin(x * 0.3 + t * 0.001) * 0.15 + Math.cos(z * 0.3 + t * 0.0012) * 0.1);
    }
    wpos.needsUpdate = true;

    // Animate island orbs (pulse)
    Object.values(state.islandMeshes).forEach(island => {
        const orb = island.userData.orb;
        if (orb) {
            orb.scale.setScalar(0.8 + Math.sin(t * 0.003 + island.position.x) * 0.2);
        }
        // Gentle bob
        island.position.y = Math.sin(t * 0.0008 + island.position.x * 0.5) * 0.3;
    });

    // Animate agents — walk toward target, idle bob
    Object.entries(state.agentMeshes).forEach(([id, mesh]) => {
        const ud = mesh.userData;
        if (ud._tx !== undefined) {
            const dx = ud._tx - mesh.position.x;
            const dz = ud._tz - mesh.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist > 0.1) {
                const speed = Math.min(dist, 3 * dt);
                mesh.position.x += (dx / dist) * speed;
                mesh.position.z += (dz / dist) * speed;
                // Face direction
                mesh.rotation.y = Math.atan2(dx, dz);
                // Walk bob
                ud.body.position.y = 0.9 + Math.sin(t * 0.01) * 0.05;
                ud.head.position.y = 1.75 + Math.sin(t * 0.01) * 0.05;
            } else {
                // Idle animation
                ud.body.position.y = 0.9 + Math.sin(t * 0.002 + hashStr(id)) * 0.03;
                ud.head.position.y = 1.75 + Math.sin(t * 0.002 + hashStr(id)) * 0.03;
            }
        }
        // Ring rotation
        if (ud.ring) ud.ring.rotation.z = t * 0.001;
    });

    // Animate beam particles
    state.beams.forEach(b => {
        const progress = ((t - b.born) / 3000) % 1;
        const p = b.status === 'delivered' ? 1 - progress : progress;
        const pos = b.curve.getPoint(p);
        b.particle.position.copy(pos);
        b.particle.scale.setScalar(0.8 + Math.sin(t * 0.01) * 0.3);
    });

    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
loadAll();
connectSSE();
animate();
</script>
